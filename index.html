<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapas Mentales - Prevención y Salud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .animate-spin-slow {
            animation: spin 8s linear infinite;
        }

        .node-card {
            position: relative;
            z-index: 10;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .node-card:hover {
            transform: translateY(-2px) scale(1.02);
        }

        /* Modal Overlay */
        .modal-overlay {
            backdrop-filter: blur(8px);
            background-color: rgba(15, 23, 42, 0.8);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 shadow-lg px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-900/50 rounded-lg border border-indigo-500/30">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400">
                        Mapas Mentales Prevención
                    </h1>
                    <p class="text-xs text-slate-400">Salud y Enfermedad (Dr. David Mujica) • 6to Secundaria</p>
                </div>
            </div>
            
            <!-- Botones de Navegación -->
            <div class="flex bg-slate-800/50 p-1 rounded-xl border border-slate-700">
                <button id="btnMap1" class="px-4 py-2 rounded-lg text-sm font-bold transition-all bg-cyan-600 text-white shadow">
                    🧼 1. Lavado de Manos
                </button>
                <button id="btnMap2" class="px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white hover:bg-slate-700">
                    🥩 2. Inocuidad Alimentaria
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-8 flex flex-col items-center justify-center relative">
        
        <!-- Background Grid Decorativo -->
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:40px_40px] opacity-20 pointer-events-none"></div>

        <!-- Título Dinámico de la Lámina -->
        <div class="text-center mb-10 relative z-10 animate-fade-in">
            <span id="mapBadge" class="inline-block px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest mb-3">Lámina 1</span>
            <h2 id="mapTitle" class="text-3xl md:text-5xl font-black text-white uppercase tracking-tight drop-shadow-lg">Título</h2>
            <p id="mapSubtitle" class="text-sm md:text-base text-slate-400 mt-3 max-w-2xl mx-auto">Subtítulo</p>
        </div>

        <!-- Renderizador del Mapa Mental -->
        <div id="mindMapContainer" class="relative w-full max-w-5xl flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16 min-h-[500px] z-10">
            <!-- El contenido dinámico se inyectará aquí -->
        </div>

    </main>

    <!-- Modal para Detalles del Nodo -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-overlay opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col transform scale-95 transition-transform duration-300" id="modalContent">
            
            <div class="flex justify-between items-center p-5 border-b border-slate-800 bg-slate-900/80">
                <div class="flex items-center gap-3">
                    <span id="modalIcon" class="text-3xl p-2 bg-slate-800 rounded-lg"></span>
                    <div>
                        <span id="modalCategory" class="text-[10px] uppercase font-black tracking-widest text-slate-400"></span>
                        <h3 id="modalTitle" class="text-xl font-black text-white"></h3>
                    </div>
                </div>
                <button id="closeModalBtn" class="p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-900/50">
                <p id="modalSummary" class="text-sm italic text-slate-400 border-l-4 pl-3 mb-6"></p>
                <div id="modalDetails" class="space-y-4">
                    <!-- Los detalles se generan por JS -->
                </div>
                <div id="modalTipContainer" class="hidden mt-6 bg-amber-950/30 border border-amber-900/50 rounded-xl p-4 flex gap-3">
                    <span class="text-2xl">💡</span>
                    <div>
                        <h4 class="text-[11px] font-black uppercase text-amber-500 tracking-wider">Nota Importante (OMS)</h4>
                        <p id="modalTip" class="text-sm text-amber-200/90 mt-1"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const svgLavadoManos = `
            <svg viewBox="0 0 100 100" class="w-24 h-24 mx-auto drop-shadow-[0_0_15px_rgba(6,182,212,0.4)] animate-pulse-slow">
                <!-- Grifo -->
                <path d="M45 10 L45 25 C45 35, 60 35, 60 45 L60 50" stroke="#94A3B8" stroke-width="6" fill="none" stroke-linecap="round" />
                <rect x="40" y="5" width="10" height="5" fill="#64748B" rx="2" />
                <!-- Chorro de agua -->
                <path d="M60 50 C60 65, 50 80, 50 90" stroke="#06B6D4" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="8 4" class="animate-[pulse_1s_linear_infinite]" />
                <!-- Manos esquemáticas -->
                <path d="M20 70 C15 60, 25 55, 30 65 C35 75, 45 75, 50 65 C55 55, 65 60, 60 70 C55 80, 45 90, 30 85 Z" fill="#FCD34D" fill-opacity="0.3" stroke="#F59E0B" stroke-width="2" />
                <path d="M80 70 C85 60, 75 55, 70 65 C65 75, 55 75, 50 65 C45 55, 35 60, 40 70 C45 80, 55 90, 70 85 Z" fill="#FCD34D" fill-opacity="0.3" stroke="#F59E0B" stroke-width="2" />
                <!-- Burbujas -->
                <circle cx="35" cy="50" r="4" fill="#67E8F9" stroke="#0891B2" stroke-width="1" />
                <circle cx="45" cy="45" r="3" fill="#67E8F9" stroke="#0891B2" stroke-width="1" />
                <circle cx="65" cy="55" r="5" fill="#67E8F9" stroke="#0891B2" stroke-width="1" />
                <circle cx="75" cy="48" r="2.5" fill="#67E8F9" stroke="#0891B2" stroke-width="1" />
            </svg>`;

        const svgInocuidad = `
            <svg viewBox="0 0 100 100" class="w-24 h-24 mx-auto drop-shadow-[0_0_15px_rgba(245,158,11,0.4)]">
                <!-- Escudo de protección -->
                <path d="M50 5 L90 20 L90 50 C90 75, 50 95, 50 95 C50 95, 10 75, 10 50 L10 20 Z" fill="#FEF3C7" fill-opacity="0.1" stroke="#F59E0B" stroke-width="3" stroke-linejoin="round" />
                <!-- Olla / Cocción -->
                <rect x="25" y="45" width="50" height="30" rx="5" fill="#94A3B8" stroke="#475569" stroke-width="2" />
                <path d="M20 45 L80 45" stroke="#475569" stroke-width="4" stroke-linecap="round" />
                <path d="M35 45 C35 30, 65 30, 65 45" fill="none" stroke="#475569" stroke-width="3" />
                <!-- Fuego -->
                <path d="M40 75 Q45 65, 50 75 T60 75" fill="none" stroke="#EF4444" stroke-width="3" class="animate-pulse-slow" />
                <path d="M45 78 Q50 70, 55 78" fill="none" stroke="#F59E0B" stroke-width="2" />
                <!-- Termómetro -->
                <rect x="75" y="30" width="6" height="35" rx="3" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.5" />
                <circle cx="78" cy="65" r="6" fill="#EF4444" />
                <line x1="78" y1="65" x2="78" y2="45" stroke="#EF4444" stroke-width="2" />
                <!-- Estrellas / Limpieza -->
                <path d="M25 25 L30 35 L40 35 L32 42 L35 52 L25 45 L15 52 L18 42 L10 35 L20 35 Z" fill="#10B981" transform="scale(0.5) translate(40, -10)" class="animate-spin-slow" />
            </svg>`;

        const mapasData = [
            {
                id: 0,
                theme: "cyan",
                badge: "Lámina 1",
                title: "¿Cómo lavarse las manos?",
                subtitle: "Procedimiento oficial de la OMS para la prevención de infecciones",
                svg: svgLavadoManos,
                nodes: [
                    {
                        title: "Indicaciones y Duración",
                        icon: "⏱️",
                        category: "Directriz General",
                        summary: "Cuándo usar jabón vs solución alcohólica y el tiempo necesario.",
                        details: [
                            "**¡Lávese las manos solo cuando estén visiblemente sucias!** Si no, utilice la solución alcohólica.",
                            "**Duración de todo el procedimiento:** Exactamente entre **40-60 segundos**."
                        ],
                        tip: "El jabón rompe la membrana lipídica de los virus, pero necesita al menos 40 segundos de fricción continua para ser completamente efectivo."
                    },
                    {
                        title: "Preparación (Pasos 0 a 2)",
                        icon: "🧼",
                        category: "Inicio",
                        summary: "Humedecer y distribuir el jabón uniformemente.",
                        details: [
                            "**Paso 0:** Mójese las manos con agua;",
                            "**Paso 1:** Deposite en la palma de la mano una cantidad de jabón suficiente para cubrir todas las superficies de las manos;",
                            "**Paso 2:** Frótese las palmas de las manos entre sí;"
                        ]
                    },
                    {
                        title: "Fricción Interdigital (Pasos 3 y 4)",
                        icon: "👐",
                        category: "Técnica",
                        summary: "Limpieza profunda entre los dedos de ambas manos.",
                        details: [
                            "**Paso 3:** Frótese la palma de la mano derecha contra el dorso de la mano izquierda entrelazando los dedos y viceversa;",
                            "**Paso 4:** Frótese las palmas de las manos entre sí, con los dedos entrelazados;"
                        ]
                    },
                    {
                        title: "Dorsos y Pulgares (Pasos 5 y 6)",
                        icon: "👍",
                        category: "Técnica",
                        summary: "Atención a nudillos y pulgares, zonas a menudo olvidadas.",
                        details: [
                            "**Paso 5:** Frótese el dorso de los dedos de una mano con la palma de la mano opuesta, agarrándose los dedos;",
                            "**Paso 6:** Frótese con un movimiento de rotación el pulgar izquierdo, atrapándolo con la palma de la mano derecha y viceversa;"
                        ]
                    },
                    {
                        title: "Yemas y Uñas (Paso 7)",
                        icon: "🖐️",
                        category: "Técnica",
                        summary: "Limpieza del lecho ungueal y punta de los dedos.",
                        details: [
                            "**Paso 7:** Frótese la punta de los dedos de la mano derecha contra la palma de la mano izquierda, haciendo un movimiento de rotación y viceversa;"
                        ],
                        tip: "Las yemas y debajo de las uñas albergan la mayor concentración de bacterias; es vital frotarlas contra la palma opuesta en forma de rotación."
                    },
                    {
                        title: "Cierre Seguro (Pasos 8 al 11)",
                        icon: "🚰",
                        category: "Finalización",
                        summary: "Enjuague, secado y prevención de recontaminación.",
                        details: [
                            "**Paso 8:** Enjuáguese las manos con agua;",
                            "**Paso 9:** Séquese con una toalla desechable;",
                            "**Paso 10:** Sírvase de la toalla para cerrar el grifo;",
                            "**Paso 11:** Sus manos son seguras."
                        ],
                        tip: "El paso 10 es fundamental: si cierra el grifo con la mano limpia desnuda, se recontaminará instantáneamente."
                    }
                ]
            },
            {
                id: 1,
                theme: "amber",
                badge: "Lámina 2",
                title: "Inocuidad de los Alimentos",
                subtitle: "Las 5 Claves de la OPS/OMS para una atención más segura",
                svg: svgInocuidad,
                nodes: [
                    {
                        title: "Clave 1: Mantenga la Limpieza",
                        icon: "✨",
                        category: "Higiene Base",
                        summary: "Prevención de la introducción de patógenos al área de preparación.",
                        details: [
                            "**Higiene Personal:** Lávese las manos **antes** y **durante** la preparación de los alimentos, y de forma obligatoria **después de ir al baño**.",
                            "**Entorno de Trabajo:** Lave y desinfecte rigurosamente todas las superficies y equipos utilizados en la preparación de alimentos.",
                            "**Protección de Vectores:** Proteja los alimentos y las áreas de cocina de insectos, plagas y otros animales que actúan como vectores mecánicos de bacterias."
                        ]
                    },
                    {
                        title: "Clave 2: Separe Crudos y Cocinados",
                        icon: "🔪",
                        category: "Contaminación Cruzada",
                        summary: "Evitar la transferencia de microorganismos entre alimentos.",
                        details: [
                            "**Uso de Utensilios:** Use equipos y utensilios **diferentes** (como cuchillos o tablas de cortar) específicamente para manipular carne, pollo, pescado y otros alimentos crudos.",
                            "**Almacenamiento Diferenciado:** Conserve siempre los alimentos crudos y los alimentos cocidos en **recipientes completamente separados** dentro del refrigerador."
                        ],
                        tip: "La contaminación cruzada ocurre cuando bacterias de la sangre de la carne cruda se transfieren a alimentos listos para consumir a través de una tabla de cortar mal lavada."
                    },
                    {
                        title: "Clave 3: Cocine Completamente",
                        icon: "🔥",
                        category: "Destrucción Térmica",
                        summary: "Aplicación de calor para eliminar agentes infecciosos.",
                        details: [
                            "**Proteínas de Riesgo:** Cocine completamente los alimentos, prestando especial atención a carnes rojas, pollo, huevos y pescados.",
                            "**Umbral de Temperatura:** Hierva los alimentos como sopas y guisos para asegurar que alcanzan los $70^\\circ\\text{C}$ ($158^\\circ\\text{F}$) en el centro del alimento.",
                            "**Recalentamiento:** Cuando consuma alimentos guardados, **recaliente completamente** la comida cocinada hasta que emita vapor."
                        ],
                        tip: "El color interior de la carne (que deje de ser rosado) es un indicador visual, pero el uso de un termómetro de cocina garantiza los $70^\\circ\\text{C}$ requeridos para esterilizar."
                    },
                    {
                        title: "Clave 4: Temperaturas Seguras",
                        icon: "🌡️",
                        category: "Control Bacteriano",
                        summary: "Prevención de la multiplicación bacteriana en la Zona de Peligro.",
                        details: [
                            "**La Zona de Peligro:** Es el rango de temperatura entre $5^\\circ\\text{C}$ y $60^\\circ\\text{C}$, donde las bacterias se multiplican rápidamente. ¡Debe evitarse!",
                            "**Regla de las 2 Horas:** **No deje** alimentos cocidos a temperatura ambiente por más de 2 horas.",
                            "**Conservación en Frío:** Refrigere lo más pronto posible los alimentos cocinados y perecederos (preferiblemente **bajo los $5^\\circ\\text{C}$**).",
                            "**Conservación en Caliente:** Mantenga la comida muy caliente (**arriba de los $60^\\circ\\text{C}$**) antes de servir.",
                            "**Descongelación:** **Nunca** descongele los alimentos a temperatura ambiente; hágalo en el refrigerador o en el microondas."
                        ]
                    },
                    {
                        title: "Clave 5: Agua y Materias Seguras",
                        icon: "💧",
                        category: "Insumos Libres de Riesgo",
                        summary: "Selección y tratamiento inicial de los productos a consumir.",
                        details: [
                            "**Agua Potable:** Use agua tratada para asegurarse de que sea microbiológicamente segura para beber o cocinar.",
                            "**Selección de Frescos:** Seleccione alimentos seguros y frescos en el mercado.",
                            "**Lavado de Vegetales:** Lave exhaustivamente las frutas y las hortalizas, **especialmente si se van a comer crudas**.",
                            "**Alimentos Procesados:** Para garantizar su inocuidad, elija alimentos que ya hayan sido procesados sanitariamente, tales como la **leche pasteurizada**."
                        ]
                    }
                ]
            }
        ];

        let activeMapIndex = 0;

        const btnMap1 = document.getElementById('btnMap1');
        const btnMap2 = document.getElementById('btnMap2');
        const mapBadge = document.getElementById('mapBadge');
        const mapTitle = document.getElementById('mapTitle');
        const mapSubtitle = document.getElementById('mapSubtitle');
        const mindMapContainer = document.getElementById('mindMapContainer');
        
        const modal = document.getElementById('detailModal');
        const modalContent = document.getElementById('modalContent');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const mIcon = document.getElementById('modalIcon');
        const mCategory = document.getElementById('modalCategory');
        const mTitle = document.getElementById('modalTitle');
        const mSummary = document.getElementById('modalSummary');
        const mDetails = document.getElementById('modalDetails');
        const mTipContainer = document.getElementById('modalTipContainer');
        const mTip = document.getElementById('modalTip');

        function formatText(text) {
            // Formatea negritas **texto** y formato matemático simulado $texto$ para las temperaturas
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>');
            formatted = formatted.replace(/\$(.*?)\$/g, '<span class="font-mono text-emerald-400 bg-emerald-950/40 px-1 rounded border border-emerald-800">$1</span>');
            return formatted;
        }

        function renderMap() {
            const data = mapasData[activeMapIndex];
            
            // Actualizar botones UI
            if(activeMapIndex === 0) {
                btnMap1.className = "px-4 py-2 rounded-lg text-sm font-bold transition-all bg-cyan-600 text-white shadow ring-2 ring-cyan-400/50";
                btnMap2.className = "px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white hover:bg-slate-700 bg-slate-800/50";
                mapBadge.className = "inline-block px-4 py-1 rounded-full bg-cyan-950 border border-cyan-500 text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-3 shadow-[0_0_15px_rgba(6,182,212,0.3)]";
                mCategory.className = "text-[10px] uppercase font-black tracking-widest text-cyan-400";
                mSummary.className = "text-sm italic text-slate-400 border-l-4 border-cyan-500 pl-3 mb-6";
            } else {
                btnMap2.className = "px-4 py-2 rounded-lg text-sm font-bold transition-all bg-amber-600 text-white shadow ring-2 ring-amber-400/50";
                btnMap1.className = "px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-white hover:bg-slate-700 bg-slate-800/50";
                mapBadge.className = "inline-block px-4 py-1 rounded-full bg-amber-950 border border-amber-500 text-amber-400 text-[10px] font-black uppercase tracking-widest mb-3 shadow-[0_0_15px_rgba(245,158,11,0.3)]";
                mCategory.className = "text-[10px] uppercase font-black tracking-widest text-amber-400";
                mSummary.className = "text-sm italic text-slate-400 border-l-4 border-amber-500 pl-3 mb-6";
            }

            // Textos de Cabecera
            mapBadge.innerText = data.badge;
            mapTitle.innerText = data.title;
            mapSubtitle.innerText = data.subtitle;

            // Limpiar contenedor principal
            mindMapContainer.innerHTML = '';
            
            // NODO CENTRAL
            const centralNode = document.createElement('div');
            centralNode.className = `relative z-20 bg-slate-900 border-2 rounded-3xl p-6 text-center w-56 flex flex-col items-center justify-center shadow-2xl transition-transform ${activeMapIndex === 0 ? 'border-cyan-500 shadow-cyan-500/20' : 'border-amber-500 shadow-amber-500/20'}`;
            centralNode.innerHTML = `
                <div class="mb-4">${data.svg}</div>
                <span class="text-[10px] uppercase font-black tracking-widest ${activeMapIndex === 0 ? 'text-cyan-400' : 'text-amber-400'}">Objetivo Central</span>
                <h3 class="text-base font-black text-white mt-1 leading-tight">${data.title}</h3>
            `;
            
            // CONTENEDOR DE RAMAS
            const branchesContainer = document.createElement('div');
            branchesContainer.className = "flex flex-col gap-4 w-full md:w-[500px] relative z-20";

            data.nodes.forEach((node) => {
                const btn = document.createElement('button');
                const colorHover = activeMapIndex === 0 ? 'hover:border-cyan-400 hover:shadow-[0_0_20px_rgba(6,182,212,0.2)]' : 'hover:border-amber-400 hover:shadow-[0_0_20px_rgba(245,158,11,0.2)]';
                const colorAccent = activeMapIndex === 0 ? 'bg-cyan-500' : 'bg-amber-500';

                btn.className = `node-card text-left bg-slate-900/90 border border-slate-700 p-4 rounded-xl flex items-center gap-4 w-full backdrop-blur transition-all ${colorHover} group overflow-hidden relative`;
                btn.onclick = () => openModal(node);
                
                btn.innerHTML = `
                    <div class="absolute left-0 top-0 w-1.5 h-full ${colorAccent} opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="text-3xl p-2 bg-slate-950 rounded-lg border border-slate-800 shadow-inner group-hover:scale-110 transition-transform">${node.icon}</div>
                    <div class="flex-1">
                        <span class="text-[9px] uppercase font-bold text-slate-500 tracking-widest">${node.category}</span>
                        <h4 class="text-sm font-black text-white group-hover:text-slate-200">${node.title}</h4>
                        <p class="text-xs text-slate-400 truncate mt-1 w-full max-w-[280px]">${node.summary}</p>
                    </div>
                    <div class="text-slate-600 group-hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    </div>
                `;
                branchesContainer.appendChild(btn);
            });

            // Ensamblar
            mindMapContainer.appendChild(centralNode);
            mindMapContainer.appendChild(branchesContainer);
        }

        function openModal(nodeData) {
            mIcon.innerText = nodeData.icon;
            mCategory.innerText = nodeData.category;
            mTitle.innerText = nodeData.title;
            mSummary.innerText = nodeData.summary;
            
            // Generar detalles de la viñeta
            mDetails.innerHTML = '';
            nodeData.details.forEach(det => {
                const div = document.createElement('div');
                div.className = "flex gap-3 text-sm text-slate-300 bg-slate-800/30 p-3.5 rounded-xl border border-slate-700/50 leading-relaxed";
                const dotColor = activeMapIndex === 0 ? 'text-cyan-400' : 'text-amber-400';
                div.innerHTML = `<span class="${dotColor} font-black mt-0.5">●</span> <p>${formatText(det)}</p>`;
                mDetails.appendChild(div);
            });

            // Tip Médico / Importante
            if (nodeData.tip) {
                mTipContainer.classList.remove('hidden');
                mTip.innerText = nodeData.tip;
            } else {
                mTipContainer.classList.add('hidden');
            }

            // Mostrar modal con animación de desvanecimiento
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // Duración exacta de la transición de Tailwind
        }

        btnMap1.addEventListener('click', () => { activeMapIndex = 0; renderMap(); });
        btnMap2.addEventListener('click', () => { activeMapIndex = 1; renderMap(); });
        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            // Cerrar si se hace clic fuera del modal (en el overlay)
            if(e.target === modal) closeModal();
        });

        // INICIALIZACIÓN
        renderMap();

    </script>
</body>
</html>
